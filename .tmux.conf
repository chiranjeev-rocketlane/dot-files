####--------------------##
#### Core Settings      ##
####--------------------##
set -g mouse on
set -g history-limit 10000

# True color support (required for theme colors)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:Tc"
set -s escape-time 10

####--------------------##
#### Custom Keybindings ##
####--------------------##
# Moving left
bind h select-pane -L
bind C-h select-pane -L

# Moving down
bind j select-pane -D
bind C-j select-pane -D

# Moving up
bind k select-pane -U
bind C-k select-pane -U

# Moving right
bind l select-pane -R
bind C-l select-pane -R

####--------------------##
#### TPM Plugins        ##
####--------------------##
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

####-------------------------------##
#### Theme Settings (tmux2k)       ##
####-------------------------------##
set -g @tmux2k-theme 'duo'
set -g @tmux2k-icons-only 'false'

# Set the status bar text to your clean slate-green text color
set -g @tmux2k-duo-fg "	#ff3333"  

# Keeps the background perfectly blended into your midnight blue window
set -g @tmux2k-duo-bg "#0b0f19"

# CRITICAL FIX: Use flat spacing to remove glitchy triangle capsules
set -g @tmux2k-show-left-sep " "
set -g @tmux2k-show-right-sep " "

####-------------------------------##
#### Resurrect & Vim Settings      ##
####-------------------------------##
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# DISABLED auto-restore on start to prevent the glitch loop
# (You can still manually restore by pressing Prefix + Ctrl-r)
set -g @continuum-restore 'off'

# Initialize TMUX plugin manager (Keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

