# set-window-option -g window-status-current-format " #[fg=#ffffff,bg=#b80707,bold]  ✦✦ #I: #W ✦✦ "
set-window-option -g window-status-current-format " #[fg=#0b0f19,bg=#ffffff,bold] ✦ #I: #W ✦ "

# Inactive tabs: Highly muted text so the active tab stands out beautifully
set-window-option -g window-status-format " #[fg=#ffff00,bg=#0b0f19]  #I: #W  "

# Keep it seamless
set-window-option -g window-status-separator ""

# Forces tmux to check for window size changes more aggressively
set -g aggressive-resize on

# If using a status bar, ensure it is pinned to the bottom 
# and doesn't rely on terminal-specific padding hacks.
set -g status-position bottom
# Force tmux to refresh the status bar to register your changes
set-option -g status-interval 1
